name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  preflight:
    runs-on: windows-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run mesh validation
        shell: pwsh
        run: .\scripts\generate_index_mesh.ps1 -Check

      - name: Run doctrine validation
        shell: pwsh
        run: .\scripts\validate_agent_mesh.ps1 -Check

      - name: Run tests
        shell: pwsh
        run: py -3 -m unittest discover -s tests -v
