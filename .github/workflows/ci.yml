name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  preflight:
    runs-on: windows-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run mesh validation
        shell: pwsh
        run: .\scripts\generate_index_mesh.ps1 -Check

      - name: Run doctrine validation
        shell: pwsh
        run: .\scripts\validate_agent_mesh.ps1 -Check

      - name: Run tests
        shell: pwsh
        run: py -3 -m unittest discover -s tests -v

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: src/client/package-lock.json

      - name: Restore client dependencies
        shell: pwsh
        run: npm ci --prefix src/client

      - name: Restore server dependencies
        shell: pwsh
        run: dotnet restore Portfolio.sln

      - name: Build server
        shell: pwsh
        run: dotnet build Portfolio.sln --configuration Release --no-restore

      - name: Test server
        shell: pwsh
        run: dotnet test tests/server --configuration Release --no-build

      - name: Test and build client
        shell: pwsh
        run: |
          Push-Location src/client
          npm test -- --run
          npm run build
          Pop-Location

  preflight-linux:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Bash syntax
        shell: bash
        run: |
          for script in scripts/*.sh; do
            bash -n "$script"
          done

      - name: Run mesh validation
        shell: bash
        run: bash ./scripts/generate_index_mesh.sh --check

      - name: Run doctrine validation
        shell: bash
        run: bash ./scripts/validate_agent_mesh.sh --check

      - name: Run tests
        shell: bash
        run: python3 -m unittest discover -s tests -v

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: src/client/package-lock.json

      - name: Restore client dependencies
        shell: bash
        run: npm ci --prefix src/client

      - name: Restore server dependencies
        shell: bash
        run: dotnet restore Portfolio.sln

      - name: Build server
        shell: bash
        run: dotnet build Portfolio.sln --configuration Release --no-restore

      - name: Test server
        shell: bash
        run: dotnet test tests/server --configuration Release --no-build

      - name: Test and build client
        shell: bash
        run: |
          pushd src/client
          npm test -- --run
          npm run build
          popd

  application-browser:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: src/client/package-lock.json

      - name: Restore client dependencies
        shell: bash
        run: npm ci
        working-directory: src/client

      - name: Install Chromium
        shell: bash
        run: npx playwright install --with-deps chromium
        working-directory: src/client

      - name: Run browser tests
        shell: bash
        run: npm run test:e2e
        working-directory: src/client
